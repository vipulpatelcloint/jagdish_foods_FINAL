name: 🚀 Build Jagdish Foods APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: 📋 Show versions
        run: |
          flutter --version
          java -version

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        continue-on-error: true

      - name: 🧪 Run tests
        run: flutter test
        continue-on-error: true

      - name: 🔨 Build Debug APK
        run: flutter build apk --debug

      - name: 📤 Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: jagdish-foods-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: 🏗️ Build Release APK
        run: flutter build apk --release

      - name: 📤 Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: jagdish-foods-release
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: ✅ List built APKs
        run: |
          echo "=== Built APK files ==="
          find build/app/outputs -name "*.apk" -exec ls -lh {} \;
          echo ""
          echo "✅ Download from Actions → Artifacts section above"
